# Automazione: ogni 10 minuti esegue main.py; se è ora di inviare, invia (con curiosita) e fa commit dello stato.
# Gira a computer spento. Intervallo tra notifiche 5-10 min (a volte 1, a volte 2 ogni 10 min).

name: Invia notifica vocabolario

permissions:
  contents: write

on:
  schedule:
    # Ogni 5 min per permettere 1 o 2 notifiche ogni 10 min (intervallo random 5-10 min)
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  invia:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui main
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ICONA_NOTIFICA_URL: ${{ secrets.ICONA_NOTIFICA_URL }}
        run: python main.py
        continue-on-error: true

      - name: Commit e push stato
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vocabolario.json data/prossimo_invio.txt data/log.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Aggiornamento stato dopo invio notifica"
          git push
