# Automazione: ogni 5 min esegue main.py; se è ora di inviare, invia e fa commit dello stato.
# Gira a computer spento. Per test: Run workflow → "Invia subito (test)" = una notifica immediata.

name: Invia notifica vocabolario

permissions:
  contents: write

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      invia_subito:
        description: "Invia una notifica subito (test)"
        required: false
        default: false
        type: boolean

jobs:
  invia:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Debug ora e stato
        run: |
          python -c "
          from datetime import datetime
          from zoneinfo import ZoneInfo
          tz = ZoneInfo('Europe/Rome')
          now = datetime.now(tz)
          print('Ora (Rome):', now.isoformat())
          try:
              p = open('data/prossimo_invio.txt').read().strip()
              print('Prossimo invio (file):', p)
          except Exception as e:
              print('Prossimo invio: (file assente)', e)
          "
          echo "Topic ntfy impostato: $([ -n \"${{ secrets.NTFY_TOPIC }}\" ] && echo si || echo NO - aggiungi secret NTFY_TOPIC)"

      - name: Esegui main
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ICONA_NOTIFICA_URL: ${{ secrets.ICONA_NOTIFICA_URL }}
          FORCE_INVIO: ${{ inputs.invia_subito && '1' || '' }}
        run: |
          python main.py
          echo "Exit code main.py: $?"

      - name: Commit e push stato
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vocabolario.json data/prossimo_invio.txt data/log.txt 2>/dev/null || true
          git diff --staged --quiet && echo "Nessun cambiamento da committare" || (git commit -m "Aggiornamento stato dopo invio notifica" && git push)
